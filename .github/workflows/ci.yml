name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:   # the live-judge eval gate runs ONLY on manual dispatch (see eval-gate job)

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Start pgvector (Docker Hub pull with retry)
        run: |
          for i in 1 2 3 4 5; do
            docker pull pgvector/pgvector:pg16 && break || { echo "docker pull failed (attempt $i), backing off"; sleep 15; }
          done
          docker run -d --name pgvector -e POSTGRES_PASSWORD=postgres -p 5432:5432 pgvector/pgvector:pg16
          echo "waiting for pgvector readiness..."
          for i in $(seq 1 30); do
            docker exec pgvector pg_isready -U postgres && break || sleep 2
          done

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Seed fixtures (local CCDA → pgvector)
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_AI }}
        run: npx tsx scripts/ingest.ts --local src/lib/ccda/__fixtures__

      - name: Generate eval baseline (first run only)
        if: github.event_name == 'push' && hashFiles('evals/results/seed-baseline.json') == ''
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_AI }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC }}
        run: |
          npm run generate:baseline
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add evals/results/seed-baseline.json evals/results/overflow-demo.json
          git diff --staged --quiet || git commit -m "ci: pin eval baseline [skip ci]"
          git push origin HEAD:${{ github.ref_name }}

      - name: Compute judge calibration kappa
        run: |
          if [ -f evals/results/seed-baseline.json ]; then
            npm run compute:kappa
          else
            echo "Baseline not yet generated — skipping kappa computation"
          fi

      - name: Validate eval artifacts
        run: npm run validate:evals

      - name: Unit + integration tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_AI }}
        run: npm test

      - name: Build
        run: npm run build

      - name: Assert required paths exist
        run: |
          set -e
          required_paths=(
            "src/app" "src/components" "src/lib/ccda" "src/lib/rag" "src/lib/eval"
            "src/lib/db" "src/lib/claude.ts" "src/lib/voyage.ts" "src/lib/ratelimit.ts"
            "src/lib/killswitch.ts" "src/lib/tokens.ts" "evals/golden" "evals/scorers"
            "evals/results" "evals/harness" "evals/thresholds.yaml" "evals/run_evals.ts"
            "evals/run_evals_example.ts" "src/example/eval-example.json"
            "scripts" "observability"
            "factory.json" ".env.example" "docker-compose.yml" ".github/workflows/ci.yml"
          )
          ok=true
          for p in "${required_paths[@]}"; do
            if [ ! -e "$p" ]; then echo "MISSING: $p"; ok=false; else echo "OK: $p"; fi
          done
          $ok || exit 1
          echo "All required paths present."

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: evals/results/test-report.json
          if-no-files-found: warn

      - name: No git-LFS pointer files
        run: |
          if git lfs ls-files 2>/dev/null | grep -q .; then
            echo "ERROR: git-LFS pointer files detected"; git lfs ls-files; exit 1
          fi
          echo "No git-LFS pointer files."

  eval-gate:
    name: Eval Gate (example)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: ci
    # Reads only src/example/eval-example.json (a committed artifact) — no DB, no
    # user eval data; gate-reds if that file is missing or the judge runtime is broken.
    # MANUAL ONLY (cost control): this is a live-judge run (k-variance × cases × 2
    # Haiku calls). Running it on every push/PR flooded the account's Haiku rate
    # limit (586 hits/24h), so it now runs ONLY on workflow_dispatch (Actions → CI →
    # Run workflow). Non-required check, so skipping it on push/PR never blocks a merge.
    if: needs.ci.result == 'success' && github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run example eval gate (live judge — never mocked)
        id: gate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_AI }}
        run: |
          exit_code=0
          npm run eval:gate:example || exit_code=$?
          echo "gate_exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          if [ "$exit_code" -eq 2 ]; then
            echo "::warning::gate-inconclusive (upstream down) — Claude or Voyage temporarily unavailable; neither green nor code-red. Re-run when services recover."
            exit 0
          fi
          exit "$exit_code"
