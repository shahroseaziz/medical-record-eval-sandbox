name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:   # the live-judge eval gate runs ONLY on manual dispatch (see eval-gate job)

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      eval_sensitive: ${{ steps.sensitive.outputs.changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # D13 (SHA-47 resolution, per the SHA-66 cross-reference): the live eval gate
      # auto-runs when a PR touches score-moving paths — scorers, golden sets,
      # thresholds, judge templates/harness — and stays manual everywhere else.
      # Bounded by construction: only PRs, only these paths (never every push —
      # the Haiku-flood guard SHA-47 added is preserved).
      - name: Detect eval-sensitive changes (D13)
        id: sensitive
        if: github.event_name == 'pull_request'
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          changed=$(git diff --name-only "$base"...HEAD | grep -E \
            '^(src/lib/eval/|evals/golden/|evals/thresholds\.yaml|evals/harness/|evals/run_evals)' || true)
          if [ -n "$changed" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Eval-sensitive paths changed:"; echo "$changed"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Start pgvector (Docker Hub pull with retry)
        run: |
          for i in 1 2 3 4 5; do
            docker pull pgvector/pgvector:pg16 && break || { echo "docker pull failed (attempt $i), backing off"; sleep 15; }
          done
          docker run -d --name pgvector -e POSTGRES_PASSWORD=postgres -p 5432:5432 pgvector/pgvector:pg16
          echo "waiting for pgvector readiness..."
          for i in $(seq 1 30); do
            docker exec pgvector pg_isready -U postgres && break || sleep 2
          done

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Seed fixtures (local CCDA → pgvector)
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_AI }}
        run: npx tsx scripts/ingest.ts --local src/lib/ccda/__fixtures__

      - name: Generate eval baseline (first run only)
        if: github.event_name == 'push' && hashFiles('evals/results/seed-baseline.json') == ''
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_AI }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC }}
        run: |
          npm run generate:baseline
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add evals/results/seed-baseline.json evals/results/overflow-demo.json
          git diff --staged --quiet || git commit -m "ci: pin eval baseline [skip ci]"
          git push origin HEAD:${{ github.ref_name }}

      - name: Compute judge calibration kappa
        run: |
          if [ -f evals/results/seed-baseline.json ]; then
            npm run compute:kappa
          else
            echo "Baseline not yet generated — skipping kappa computation"
          fi

      - name: Validate eval artifacts
        run: npm run validate:evals

      - name: Unit + integration tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_AI }}
        run: npm test

      - name: Build
        run: npm run build

      - name: Assert required paths exist
        run: |
          set -e
          required_paths=(
            "src/app" "src/components" "src/lib/ccda" "src/lib/rag" "src/lib/eval"
            "src/lib/db" "src/lib/claude.ts" "src/lib/voyage.ts" "src/lib/ratelimit.ts"
            "src/lib/killswitch.ts" "src/lib/tokens.ts" "evals/golden" "evals/scorers"
            "evals/results" "evals/harness" "evals/thresholds.yaml" "evals/run_evals.ts"
            "evals/run_evals_example.ts" "src/example/eval-example.json"
            "scripts" "observability"
            "factory.json" ".env.example" "docker-compose.yml" ".github/workflows/ci.yml"
          )
          ok=true
          for p in "${required_paths[@]}"; do
            if [ ! -e "$p" ]; then echo "MISSING: $p"; ok=false; else echo "OK: $p"; fi
          done
          $ok || exit 1
          echo "All required paths present."

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: evals/results/test-report.json
          if-no-files-found: warn

      - name: No git-LFS pointer files
        run: |
          if git lfs ls-files 2>/dev/null | grep -q .; then
            echo "ERROR: git-LFS pointer files detected"; git lfs ls-files; exit 1
          fi
          echo "No git-LFS pointer files."

  eval-gate:
    name: Eval Gate (example)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: ci
    # Reads only src/example/eval-example.json (a committed artifact) — no DB, no
    # user eval data; gate-reds if that file is missing or the judge runtime is broken.
    # R14: also exercises the structured-diff + reference-judge runtime paths, incl. a
    # malformed reference-judge negative fixture that must surface "errored" (not a crash
    # or fabricated verdict). The deterministic halves of those checks also run in `npm test`.
    # TRIGGER POLICY (D13, resolves SHA-47): manual dispatch as before, PLUS
    # auto-run on pull_requests that touch score-moving paths (see the ci job's
    # "Detect eval-sensitive changes" step). The every-push flood that SHA-47
    # guarded against stays impossible: pushes never trigger it, and PRs only
    # when scorers/golden/thresholds/judge-harness change. On those PRs the gate
    # IS load-bearing: a band violation fails the run.
    if: needs.ci.result == 'success' && (github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && needs.ci.outputs.eval_sensitive == 'true'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run example eval gate (live judge — never mocked)
        id: gate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_AI }}
        run: |
          exit_code=0
          npm run eval:gate:example || exit_code=$?
          echo "gate_exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          if [ "$exit_code" -eq 2 ]; then
            echo "::warning::gate-inconclusive (upstream down) — Claude or Voyage temporarily unavailable; neither green nor code-red. Re-run when services recover."
            exit 0
          fi
          exit "$exit_code"
